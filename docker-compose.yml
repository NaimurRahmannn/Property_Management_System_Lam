services:
  db:
    build:
      context: ./docker/postgres
    container_name: vacation_rental_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: vacation_rental
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vacation_rental"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    container_name: vacation_rental_django
    restart: unless-stopped
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
