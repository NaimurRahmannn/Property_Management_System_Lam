{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}StayFinder{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'css/styles.css' %}">
  {% block head_extra %}{% endblock %}
</head>
<body>
  <header class="site">
    <div class="wrap">
      <a href="{% url 'property_app:home' %}" class="logo">Stay<span>Finder</span></a>
    </div>
  </header>
  <main>{% block content %}{% endblock %}</main>
  <footer class="site"><div class="wrap">StayFinder &middot; Vacation rentals demo</div></footer>
  {% block scripts %}{% endblock %}
</body>
</html>
